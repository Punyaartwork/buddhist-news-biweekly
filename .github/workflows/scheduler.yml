name: Scheduler — buddhist news biweekly

# Runs the buddhist-news-biweekly skill every other day at 06:00 Asia/Bangkok.
# Bangkok is UTC+7 → 06:00 BKK == 23:00 UTC the previous day.
# Cron `0 23 */2 * *` fires every 2nd day at 23:00 UTC.

on:
  schedule:
    - cron: '0 23 */2 * *'
  workflow_dispatch:

jobs:
  run-skill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
